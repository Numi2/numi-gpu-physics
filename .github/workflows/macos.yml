name: macOS Metal validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift tests
        run: swift test
      - name: Static cross-language audit
        run: python3 Scripts/static-audit.py
      - name: Independent shear-wave reference
        run: |
          python3 Reference/shear_wave_reference.py
          python3 Reference/shear_wave_convergence.py
      - name: Compile Metal kernels
        run: Scripts/check-metal.sh
